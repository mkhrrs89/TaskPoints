<script>
    const STORAGE_KEY = "taskpoints_v1";
    const $ = (id) => document.getElementById(id);
    let pageStateCache = null;
    let pageStateCacheDirty = true;
    let pageStateFreshReadCount = 0;

function invalidatePageStateCache() {
  pageStateCacheDirty = true;
}

function readPageStateFresh() {
  pageStateFreshReadCount += 1;
  if (window.TP_DEBUG_PERF) {
    console.debug('[TP_DEBUG_PERF][matchups] fresh storage parse #' + pageStateFreshReadCount);
  }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      pageStateCache = {
        tasks: [],
        completions: [],
        players: [],
        habits: [],
        flexActions: [],
        gameHistory: [],
        matchups: [],
        schedule: [],
        opponentDripSchedules: [],
        workHistory: [],
        weightHistory: [],
        vo2MaxHistory: [],
        liveDiffHistory: {},
        liveDiffSnapshots: {},
        youImageId: "",
        youName: "",
        youPrimaryColor: "#1a383b",
        youSecondaryColor: "#254c52",
        projects: [],
        notes: "",
        habitTagColors: {},
        scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
          ? TaskPointsCore.normalizeScoringSettings({})
          : {}
      };
      pageStateCacheDirty = false;
      return pageStateCache;
    }

    const p = TaskPointsCore.readTaskPointsStoredState(STORAGE_KEY, {}) || {};

    pageStateCache = {
      tasks: Array.isArray(p.tasks) ? p.tasks : [],
      completions: Array.isArray(p.completions) ? p.completions : [],
      players: Array.isArray(p.players) ? p.players : [],
      habits: Array.isArray(p.habits) ? p.habits : [],
      flexActions: Array.isArray(p.flexActions) ? p.flexActions : [],
      gameHistory: Array.isArray(p.gameHistory) ? p.gameHistory : [],
      matchups: Array.isArray(p.matchups) ? p.matchups : [],
      schedule: Array.isArray(p.schedule) ? p.schedule : [],
      opponentDripSchedules: Array.isArray(p.opponentDripSchedules) ? p.opponentDripSchedules : [],
      workHistory: Array.isArray(p.workHistory) ? p.workHistory : [],
      weightHistory: Array.isArray(p.weightHistory) ? p.weightHistory : [],
      vo2MaxHistory: Array.isArray(p.vo2MaxHistory) ? p.vo2MaxHistory : [],
      liveDiffHistory: p.liveDiffHistory && typeof p.liveDiffHistory === "object" ? p.liveDiffHistory : {},
      liveDiffSnapshots: p.liveDiffSnapshots && typeof p.liveDiffSnapshots === "object" ? p.liveDiffSnapshots : {},
      youImageId: typeof p.youImageId === "string" ? p.youImageId : "",
      youName: typeof p.youName === "string" ? p.youName : "",
      youPrimaryColor: normalizeHexColor(p.youPrimaryColor) || "#1a383b",
      youSecondaryColor: normalizeHexColor(p.youSecondaryColor) || "#254c52",
      projects: Array.isArray(p.projects) ? p.projects : [],
      notes: typeof p.notes === "string" ? p.notes : "",
      habitTagColors: normalizeHabitTagColors(p.habitTagColors),
      scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
        ? TaskPointsCore.normalizeScoringSettings(p.scoringSettings || {})
        : (p.scoringSettings || {}),
      currentSeason: p.currentSeason || null,
      latestSeasonId: typeof p.latestSeasonId === "string" ? p.latestSeasonId : "",
      seasonHistory: Array.isArray(p.seasonHistory) ? p.seasonHistory : []
    };

  } catch (e) {
    console.error("Failed to load TaskPoints state", e);
    pageStateCache = {
      tasks: [],
      completions: [],
      players: [],
      habits: [],
      flexActions: [],
      gameHistory: [],
      matchups: [],
      schedule: [],
      opponentDripSchedules: [],
      workHistory: [],
      weightHistory: [],
      vo2MaxHistory: [],
      liveDiffHistory: {},
      liveDiffSnapshots: {},
      youImageId: "",
      youName: "",
      youPrimaryColor: "#1a383b",
      youSecondaryColor: "#254c52",
      projects: [],
      notes: "",
      habitTagColors: {},
      scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
        ? TaskPointsCore.normalizeScoringSettings({})
        : {}
    };
  }
  pageStateCacheDirty = false;
  return pageStateCache;
}

function load() {
  return pageStateCacheDirty ? readPageStateFresh() : pageStateCache;
}

    function getYouName(state) {
      const name = state && typeof state.youName === "string"
        ? state.youName.trim()
        : "";
      return name || "You";
    }

    // Turn a Date (or ISO string) into "YYYY-MM-DD" like the rest of the app
    function dateKey(d) {
      const dt = d instanceof Date ? d : new Date(d);
      if (!dt || Number.isNaN(dt.getTime())) return "";
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, "0");
      const day = String(dt.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function makeId() {
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }
      return `id_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function isPlayerActive(player) {
      return !!player && player.active !== false;
    }

    function logBootReadOnlySkip(pathName) {
      if (window.TP_DEBUG_PERF) {
        console.debug(`[TP boot readonly] skipped auto-save path: ${pathName}`);
      }
    }

    function syncYouMatchupsWithCompletions(state, { persist = false, pathName = 'syncYouMatchupsWithCompletions' } = {}) {
      if (!window.TaskPointsCore || typeof TaskPointsCore.syncYouMatchups !== "function") {
        return state;
      }

      const { state: nextState, changed } = TaskPointsCore.syncYouMatchups(state);
      if (changed && persist) {
        save(nextState, pathName);
      } else if (changed) {
        logBootReadOnlySkip(pathName);
      }
      return nextState;
    }

    function ordinal(n){
      const s=["th","st","nd","rd"], v=n%100;
      return n + (s[(v-20)%10] || s[v] || s[0]);
    }

    function formatLongDate(key){
      // key: "YYYY-MM-DD"
      const [y,m,d] = key.split("-").map(x => parseInt(x,10));
      const dt = new Date(y, m-1, d);
      const weekday = dt.toLocaleDateString(undefined, { weekday:"long" });
      const month   = dt.toLocaleDateString(undefined, { month:"short" });
      return `${weekday}, ${month} ${ordinal(d)}, ${y}`;
    }

    function formatShortDate(key){
      if (!key) return "Unknown date";
      const parts = key.split("-").map(x => parseInt(x,10));
      if (parts.length !== 3 || parts.some(n => Number.isNaN(n))) return "Unknown date";
      const [y,m,d] = parts;
      const dt = new Date(y, m-1, d);
      if (!dt || Number.isNaN(dt.getTime())) return "Unknown date";
      const month = dt.toLocaleDateString(undefined, { month:"short" });
      return `${month} ${ordinal(d)}, ${y}`;
    }

    function getMatchupDateKey(matchup){
      return matchup.dateKey || matchup.date || (matchup.dateISO ? dateKey(matchup.dateISO) : "");
    }

    function isMatchupRevealed(matchup, includeToday){
      const key = getMatchupDateKey(matchup);
      if (window.TaskPointsCore?.isMatchupRevealed) {
        return TaskPointsCore.isMatchupRevealed(key, { includeToday });
      }
      if (!key) return false;
      const today = window.TaskPointsCore?.todayKey ? TaskPointsCore.todayKey() : "";
      return includeToday ? key <= today : key < today;
    }

    function shouldRevealMatchup(matchup){
      if (!matchup) return false;
      return isMatchupRevealed(matchup, false);
    }

    function activePlayerIds(state) {
      const ids = new Set(["YOU"]);
      (state.players || []).forEach(player => {
        if (player && player.id && isPlayerActive(player)) ids.add(player.id);
      });
      return ids;
    }

    function removeOpponentDripSchedule(state, dateKeyStr, playerId) {
      const schedules = Array.isArray(state.opponentDripSchedules) ? state.opponentDripSchedules : [];
      state.opponentDripSchedules = schedules.filter(s => !(s && s.date === dateKeyStr && s.playerId === playerId));
    }

    function shuffle(arr){
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function computeYouScoreForDate(dateKeyStr, state){
      if (!dateKeyStr) return 0;
      if (window.TaskPointsCore && typeof TaskPointsCore.buildDaySnapshot === "function" && typeof TaskPointsCore.computeDayTotals === "function") {
        const snapshot = TaskPointsCore.buildDaySnapshot(dateKeyStr, state);
        const totals = TaskPointsCore.computeDayTotals(snapshot);
        return Number((totals.total || 0).toFixed(1));
      }

      const comps = Array.isArray(state?.completions) ? state.completions : [];
      if (!comps.length) return 0;
      let total = 0;
      comps.forEach(c => {
        if (!c || !c.completedAtISO) return;
        const key = dateKey(c.completedAtISO);
        if (key === dateKeyStr) {
const pts = window.TaskPointsCore?.pointsForCompletion
  ? TaskPointsCore.pointsForCompletion(c, state)
  : Number(c.points || 0);
total += pts;
        }
      });
      return Number(total.toFixed(1));
    }

  // Compatibility wrapper. Final NPC scoring is centralized in scoring_core.js.
  function simulateAiScoreForPlayer(player, dateKeyStr, state, context = {}){
  if (typeof TaskPointsCore?.simulateAiScoreForPlayerCore !== "function") {
    console.error("simulateAiScoreForPlayerCore is missing. Check scoring_core.js script order.");
    return 0;
  }
  return TaskPointsCore.simulateAiScoreForPlayerCore(player, dateKeyStr, {
    state,
    context
  });
}

// Compatibility wrapper. NPC drip schedule generation is centralized in scoring_core.js.
function generateOpponentDripSchedule(dateKeyStr, playerId, totalPoints){
  if (typeof TaskPointsCore?.generateOpponentDripScheduleCore !== "function") {
    console.error("generateOpponentDripScheduleCore is missing. Check scoring_core.js script order.");
    return { date: dateKeyStr, playerId, total: Math.max(0, Math.round((Number(totalPoints) || 0) * 10) / 10), events: [] };
  }
  return TaskPointsCore.generateOpponentDripScheduleCore(totalPoints, dateKeyStr, { playerId });
}

    function ensureOpponentDripSchedule(state, dateKeyStr, playerId, totalPoints){
      if (!dateKeyStr || !playerId) return null;

      const list = Array.isArray(state.opponentDripSchedules) ? state.opponentDripSchedules : [];
      const totalRounded = Math.max(0, Math.round((Number(totalPoints) || 0) * 10) / 10);
      const existingIdx = list.findIndex(s => s && s.date === dateKeyStr && s.playerId === playerId);

      if (existingIdx !== -1) {
        const existing = list[existingIdx];
        if (existing && Math.abs((existing.total || 0) - totalRounded) < 0.001 && Array.isArray(existing.events) && existing.events.length) {
          return existing;
        }
      }

      const next = generateOpponentDripSchedule(dateKeyStr, playerId, totalRounded);
      const updated = list.filter(s => !(s && s.date === dateKeyStr && s.playerId === playerId));
      updated.push(next);

      state.opponentDripSchedules = updated;
      if (window.TaskPointsCore?.cleanupOpponentDripSchedules) {
        state = TaskPointsCore.cleanupOpponentDripSchedules(state);
      }
      return next;
    }

    function upsertGameHistoryEntry(state, dateKeyStr, playerId, score, effects = undefined) {
      if (!playerId || playerId === "YOU") return;
      const hasEffects = effects && typeof effects === "object";
      const history = Array.isArray(state.gameHistory) ? state.gameHistory : [];
      const existing = history.find(entry => entry && entry.playerId === playerId && entry.date === dateKeyStr);
      if (existing) {
        existing.score = score;
        if (hasEffects) existing.effects = effects;
      } else {
        const next = {
          id: makeId(),
          date: dateKeyStr,
          playerId,
          score
        };
        if (hasEffects) next.effects = effects;
        history.push(next);
      }
      state.gameHistory = history;
    }

    function formatScore(score){
     const num = Number(score);
     if (!Number.isFinite(num)) return "0";
     return Number.isInteger(num) ? String(num) : num.toFixed(1);
   }
    
    function requestScoreInput(label, currentScore) {
      const current = Number(currentScore);
      const fallback = Number.isFinite(current) ? current : 0;
      while (true) {
        const input = prompt(`Edit ${label} score:`, formatScore(fallback));
        if (input === null) return null;
        const next = Number(input);
        if (Number.isFinite(next)) return next;
        alert("Please enter a valid numeric score.");
      }
    }

function csvEscape(value) {
  const text = value == null ? "" : String(value);

  if (
    text.includes(",") ||
    text.includes('"') ||
    text.includes("\n") ||
    text.includes("\r")
  ) {
    return `"${text.replace(/"/g, '""')}"`;
  }

  return text;
}

function downloadTextFile(filename, text, mimeType = "text/csv;charset=utf-8") {
  const blob = new Blob([text], { type: mimeType });
  const url = URL.createObjectURL(blob);

  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();

  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function matchupEffectLabel(value) {
  if (value === true) return "Yes";
  if (value === false) return "No";
  return "";
}

function resultForScores(ownScore, opponentScore) {
  const own = Number(ownScore);
  const opponent = Number(opponentScore);

  if (!Number.isFinite(own) || !Number.isFinite(opponent)) return "";
  if (own > opponent) return "W";
  if (own < opponent) return "L";
  return "T";
}

function emptyRecord() {
  return { wins: 0, losses: 0, ties: 0 };
}

function copyRecord(record) {
  return {
    wins: Number(record?.wins) || 0,
    losses: Number(record?.losses) || 0,
    ties: Number(record?.ties) || 0
  };
}

function formatRecord(record) {
  const r = record || emptyRecord();

  if (r.ties > 0) {
    return `${r.wins}-${r.losses}-${r.ties}`;
  }

  return `${r.wins}-${r.losses}`;
}

function formatRecordForSpreadsheet(record) {
  const text = formatRecord(record);
  return `="${text}"`;
}

function applyResultToRecord(record, result) {
  if (result === "W") record.wins += 1;
  else if (result === "L") record.losses += 1;
  else if (result === "T") record.ties += 1;
}

function buildMatchupExportRows(state, startDateKey, endDateKey) {
  const matchups = Array.isArray(state?.matchups)
    ? state.matchups.slice()
    : [];

  const playerNameById = new Map(
    (Array.isArray(state?.players) ? state.players : [])
      .filter(player => player?.id)
      .map(player => [
        String(player.id),
        player.name || "Unnamed"
      ])
  );

  const youName =
    typeof getYouName === "function"
      ? getYouName(state)
      : "You";

  function playerName(id, matchup) {
    if (id === "YOU") return youName;

    const stored = playerNameById.get(String(id));
    if (stored) return stored;

    if (matchup?.playerAId === id && matchup.playerAName) {
      return matchup.playerAName;
    }

    if (matchup?.playerBId === id && matchup.playerBName) {
      return matchup.playerBName;
    }

    return "Unknown";
  }

  // Records must be processed from oldest to newest.
  const chronological = matchups
    .filter(matchup => {
      const key =
        typeof getMatchupDateKey === "function"
          ? getMatchupDateKey(matchup)
          : String(matchup?.dateKey || matchup?.date || "");

      return key && key <= endDateKey;
    })
    .sort((a, b) => {
      const aKey =
        typeof getMatchupDateKey === "function"
          ? getMatchupDateKey(a)
          : String(a?.dateKey || a?.date || "");

      const bKey =
        typeof getMatchupDateKey === "function"
          ? getMatchupDateKey(b)
          : String(b?.dateKey || b?.date || "");

      const dateCompare = aKey.localeCompare(bKey);
      if (dateCompare !== 0) return dateCompare;

      return String(a?.id || "").localeCompare(String(b?.id || ""));
    });

  const NO_EFFECTS = {
    intimidationApplied: false,
    poiseApplied: false,
    intimidatedByPlayerId: null,
    poisePlayerId: null
  };

  const historyEffectsByPlayerDate = new Map();
  (Array.isArray(state?.gameHistory) ? state.gameHistory : []).forEach(entry => {
    const historyDate =
      typeof getHistoryDateKey === "function"
        ? getHistoryDateKey(entry)
        : String(entry?.dateKey || entry?.date || entry?.dateISO || "").slice(0, 10);
    const historyPlayerId = String(entry?.playerId || "");
    if (historyDate && historyPlayerId && entry?.effects && typeof entry.effects === "object") {
      historyEffectsByPlayerDate.set(`${historyDate}|${historyPlayerId}`, entry.effects);
    }
  });

  function resolveEffects(matchup, dateKey, playerId, sideKey) {
    const direct = matchup?.[sideKey];
    if (direct && typeof direct === "object") return direct;
    const id = String(playerId || "");
    return historyEffectsByPlayerDate.get(`${dateKey}|${id}`) ?? (id === "YOU" ? NO_EFFECTS : null);
  }

  const records = new Map();
  const rows = [];

  function getRecord(playerId) {
    const key = String(playerId || "");

    if (!records.has(key)) {
      records.set(key, emptyRecord());
    }

    return records.get(key);
  }

  chronological.forEach(matchup => {
    const dateKey =
      typeof getMatchupDateKey === "function"
        ? getMatchupDateKey(matchup)
        : String(matchup?.dateKey || matchup?.date || "");

    const aId = matchup.playerAId;
    const bId = matchup.playerBId;

    const scoreA = Number(matchup.scoreA);
    const scoreB = Number(matchup.scoreB);

    const resultA = resultForScores(scoreA, scoreB);
    const resultB = resultForScores(scoreB, scoreA);

    const aBefore = copyRecord(getRecord(aId));
    const bBefore = copyRecord(getRecord(bId));

    applyResultToRecord(getRecord(aId), resultA);
    applyResultToRecord(getRecord(bId), resultB);

    const aAfter = copyRecord(getRecord(aId));
    const bAfter = copyRecord(getRecord(bId));

    if (dateKey < startDateKey || dateKey > endDateKey) {
      return;
    }

    const aEffects = resolveEffects(matchup, dateKey, aId, "playerAEffects");
    const bEffects = resolveEffects(matchup, dateKey, bId, "playerBEffects");

    rows.push({
      date: dateKey,
      matchupType: matchup.matchupType || "exhibition",

      playerA: playerName(aId, matchup),
      playerAScore: Number.isFinite(scoreA) ? scoreA : "",
      playerAResult: resultA,
      playerARecordBefore: formatRecordForSpreadsheet(aBefore),
      playerARecordAfter: formatRecordForSpreadsheet(aAfter),
// A's intimidation affects B's score, so its activation is recorded
// while Player B is being simulated.
playerAIntimidationActivated:
  matchupEffectLabel(bEffects?.intimidationApplied),

// A's poise affects A's own score.
playerAPoiseActivated:
  matchupEffectLabel(aEffects?.poiseApplied),

      playerB: playerName(bId, matchup),
      playerBScore: Number.isFinite(scoreB) ? scoreB : "",
      playerBResult: resultB,
      playerBRecordBefore: formatRecordForSpreadsheet(bBefore),
      playerBRecordAfter: formatRecordForSpreadsheet(bAfter),
// B's intimidation affects A's score, so its activation is recorded
// while Player A is being simulated.
playerBIntimidationActivated:
  matchupEffectLabel(aEffects?.intimidationApplied),

// B's poise affects B's own score.
playerBPoiseActivated:
  matchupEffectLabel(bEffects?.poiseApplied)
    });
  });

  return rows;
}

function exportMatchupsForSelectedRange() {
  const startInput = document.getElementById("matchupExportStart");
  const endInput = document.getElementById("matchupExportEnd");

  const startDateKey = String(startInput?.value || "");
  const endDateKey = String(endInput?.value || "");

  if (!/^\d{4}-\d{2}-\d{2}$/.test(startDateKey)) {
    alert("Choose a valid start date.");
    return;
  }

  if (!/^\d{4}-\d{2}-\d{2}$/.test(endDateKey)) {
    alert("Choose a valid end date.");
    return;
  }

  if (startDateKey > endDateKey) {
    alert("The start date must be before or equal to the end date.");
    return;
  }

  const latestState =
    typeof load === "function"
      ? load()
      : state;

  const rows = buildMatchupExportRows(
    latestState,
    startDateKey,
    endDateKey
  );

  if (!rows.length) {
    alert("No matchups were found in that date range.");
    return;
  }

  const columns = [
    ["Date", "date"],
    ["Matchup Type", "matchupType"],

    ["Player A", "playerA"],
    ["Player A Score", "playerAScore"],
    ["Player A Result", "playerAResult"],
    ["Player A Record Before", "playerARecordBefore"],
    ["Player A Record After", "playerARecordAfter"],
["Player A Intimidation Activated", "playerAIntimidationActivated"],
["Player A Poise Activated", "playerAPoiseActivated"],

    ["Player B", "playerB"],
    ["Player B Score", "playerBScore"],
    ["Player B Result", "playerBResult"],
    ["Player B Record Before", "playerBRecordBefore"],
    ["Player B Record After", "playerBRecordAfter"],
["Player B Intimidation Activated", "playerBIntimidationActivated"],
["Player B Poise Activated", "playerBPoiseActivated"]
  ];

  const csvLines = [
    columns.map(([heading]) => csvEscape(heading)).join(","),
    ...rows.map(row =>
      columns
        .map(([, key]) => csvEscape(row[key]))
        .join(",")
    )
  ];

  // BOM helps Excel recognize the text correctly.
  const csvText = "\uFEFF" + csvLines.join("\r\n");

  downloadTextFile(
    `taskpoints-matchups-${startDateKey}-to-${endDateKey}.csv`,
    csvText
  );
}

          const youScoreLabel = formatScore(youScore);

          if (youScore > oppScore) {

        } else if (bScore > aScore) {
          return `${bName} beat ${aName}, ${formatScore(bScore)}–${formatScore(aScore)}`;

            label.className = "flex-1";
            label.textContent = `${dateLabel} - ${summary}`;
            li.appendChild(label);
            if (m.playerAId !== "YOU" || m.playerBId !== "YOU") {
              const editBtn = document.createElement("button");
              editBtn.type = "button";
              editBtn.className = "btn btn-ghost btn-toolbar text-xs";
              editBtn.textContent = "Edit scores";
              bindEditScoreButton(editBtn, m);
              li.appendChild(editBtn);
            }
            list.appendChild(li);
          });

makeCollapsibleSection(section, heading, list);
playerContainer.appendChild(section);
      });
    }

function normalizeHexColor(value) {
  if (!value) return null;
  let hex = String(value).trim();
  if (!hex) return null;
  if (!hex.startsWith('#')) hex = `#${hex}`;
  if (!/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(hex)) return null;
  if (hex.length === 4) {
    hex = `#${hex.slice(1).split('').map((c) => c + c).join('')}`;
  }
  return hex.toLowerCase();
}

function normalizeHabitTagColors(value) {
  if (!value || typeof value !== 'object') return {};
  const next = {};
  Object.entries(value).forEach(([tag, color]) => {
    const normalized = normalizeHexColor(color);
    if (normalized) next[String(tag)] = normalized;
  });
  return next;
}

function normalizeHabit(habit) {
  if (!habit || typeof habit !== 'object') return habit;
  return {
    ...habit,
    tag: typeof habit.tag === 'string' ? habit.tag.trim() : '',
    halfPointEnabled: habit.halfPointEnabled !== false
  };
}

function normalizeState(s) {
  const normalized = {
    tasks: Array.isArray(s.tasks) ? s.tasks : [],
    completions: Array.isArray(s.completions) ? s.completions : [],
    players: Array.isArray(s.players) ? s.players : [],
    habits: Array.isArray(s.habits) ? s.habits.map(normalizeHabit) : [],
    flexActions: Array.isArray(s.flexActions) ? s.flexActions : [],
    gameHistory: Array.isArray(s.gameHistory) ? s.gameHistory : [],
    matchups: Array.isArray(s.matchups) ? s.matchups : [],
    schedule: Array.isArray(s.schedule) ? s.schedule : [],
    weightHistory: Array.isArray(s.weightHistory) ? s.weightHistory : [],
    vo2MaxHistory: Array.isArray(s.vo2MaxHistory) ? s.vo2MaxHistory : [],
    liveDiffHistory: s.liveDiffHistory && typeof s.liveDiffHistory === "object" ? s.liveDiffHistory : {},
    liveDiffSnapshots: s.liveDiffSnapshots && typeof s.liveDiffSnapshots === "object" ? s.liveDiffSnapshots : {},
    opponentDripSchedules: Array.isArray(s.opponentDripSchedules) ? s.opponentDripSchedules : [],
    workHistory: Array.isArray(s.workHistory) ? s.workHistory : [],
    reminders: Array.isArray(s.reminders) ? s.reminders : [],
    youImageId: typeof s.youImageId === "string" ? s.youImageId : "",
    youName: typeof s.youName === "string" ? s.youName : "",
    youPrimaryColor: normalizeHexColor(s.youPrimaryColor) || "#1a383b",
    youSecondaryColor: normalizeHexColor(s.youSecondaryColor) || "#254c52",
    projects: Array.isArray(s.projects) ? s.projects : [],
    notes: typeof s.notes === "string" ? s.notes : "",
    habitTagColors: normalizeHabitTagColors(s.habitTagColors),
    scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
      ? TaskPointsCore.normalizeScoringSettings(s.scoringSettings || {})
      : (s.scoringSettings || {}),
    currentSeason: s.currentSeason || null,
    latestSeasonId: typeof s.latestSeasonId === "string" ? s.latestSeasonId : "",
    seasonHistory: Array.isArray(s.seasonHistory) ? s.seasonHistory : []
  };
  if (window.TaskPointsCore?.cleanupOpponentDripSchedules) {
    return TaskPointsCore.cleanupOpponentDripSchedules(normalized);
  }
  return normalized;
}

function save(nextState, savePath = 'matchups-save') {
  try {
    const existing = load() || {};
    const fullState = { ...existing, ...(nextState || {}) };
    if (window.TaskPointsCore?.mergeAndSaveState) {
      // Matchups only edits matchup/game-history domains. Always merge with the
      // latest full app snapshot so Home-only histories (weight, VO2, live H2H
      // differential samples) cannot be replaced by this page's partial state.
      const saved = TaskPointsCore.mergeAndSaveState(fullState, { storageKey: STORAGE_KEY, savePath }).state;
      pageStateCache = saved;
      pageStateCacheDirty = false;
      return saved;
    }
    if (window.TaskPointsCore?.saveStateSnapshot) {
      const saved = TaskPointsCore.saveStateSnapshot(fullState, { storageKey: STORAGE_KEY, savePath }).state;
      pageStateCache = saved;
      pageStateCacheDirty = false;
      return saved;
    }
    const merged = { ...existing, ...nextState };
    pageStateCache = merged;
    pageStateCacheDirty = false;
    console.warn("matchups save skipped localStorage write; TaskPointsCore missing.");
    return merged;
  } catch (e) {
    invalidatePageStateCache();
    console.error("Failed to save TaskPoints state", e);
    return nextState;
  }
}

      const tabs = document.querySelectorAll("#matchupTabs [data-tab]");
      const chrono = $("matchupsChronological");
      const player = $("matchupsByPlayer");

      tabs.forEach(tab => {
        tab.addEventListener("click", () => {
          const target = tab.getAttribute("data-tab");
          const isChrono = target === "chronological";
          chrono.classList.toggle("hidden", !isChrono);
          player.classList.toggle("hidden", isChrono);
          tabs.forEach(btn => {
            btn.classList.toggle("btn-teal", btn === tab);
            btn.classList.toggle("btn-ghost", btn !== tab);
          });
        });
      });
    });
  </script>
