<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>TaskPoints — Inbox</title>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="TaskPoints"/>

  <link
    rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect width='256' height='256' fill='%230b0d10'/><text x='128' y='160' text-anchor='middle' font-size='150' fill='white'>TP</text></svg>"
  >

  <link
    rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%230b0d10'/><text x='50' y='62' font-size='60' text-anchor='middle' fill='white'>TP</text></svg>"
  >

  <link rel="stylesheet" href="assets/tailwind.css">
  <link rel="stylesheet" href="styles.css">

  <link rel="preload" href="toolbar.js" as="script">
  <script src="scoring_core.js"></script>
  <script src="toolbar.js" defer></script>
</head>

<body class="min-h-screen inbox-page">
  <div
    class="mx-auto max-w-6xl p-4 sm:p-6 pb-24"
    style="padding-top: calc(env(safe-area-inset-top) + 12px);"
  >

    <!-- Mobile header -->
    <div class="flex items-center justify-between gap-3 mb-3 md:hidden">
      <a href="index.html" class="flex items-center gap-3 min-w-0">
        <img
          src="assets/taskpoints-logo.png"
          alt="TaskPoints logo"
          class="w-10 h-10 rounded-2xl object-cover shrink-0 shadow-sm"
        >

        <h1 class="text-2xl font-extrabold tracking-tight leading-tight truncate">
          <span style="color:#fb923c;">Task</span><span style="color:#1e666d;">Points</span>
        </h1>
      </a>

      <div class="flex items-center gap-2">
        <button
          type="button"
          class="btn btn-ghost btn-toolbar"
          data-export-button
        >
          Export
        </button>

        <label class="btn btn-ghost btn-toolbar cursor-pointer">
          <span>Import</span>
          <input
            type="file"
            accept="application/json"
            class="hidden"
            data-import-input
          />
        </label>
      </div>
    </div>

    <!-- Desktop header/navigation -->
    <header class="flex flex-wrap items-center justify-between gap-3 mb-4">
      <a href="index.html" class="hidden md:flex items-center gap-3">
        <img
          src="assets/taskpoints-logo.png"
          alt="TaskPoints logo"
          class="w-9 h-9 rounded-2xl object-cover shadow-sm"
        >

        <div>
          <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">
            TaskPoints
          </h1>
          <p class="text-xs opacity-70">Inbox</p>
        </div>
      </a>

      <div class="toolbar header-nav">
        <a href="index.html" class="btn btn-teal btn-toolbar nav-btn">
          Main
        </a>

        <a
          href="today.html"
          class="btn btn-teal btn-toolbar nav-btn mobile-hide-header-today"
        >
          Today
        </a>

        <a
          href="inbox.html"
          class="btn btn-teal btn-toolbar nav-btn active"
          aria-current="page"
        >
          Inbox
        </a>

        <a href="daily_sources.html" class="btn btn-teal btn-toolbar nav-btn">
          Sources
        </a>

        <a href="log.html" class="btn btn-teal btn-toolbar nav-btn">
          Log
        </a>

        <a href="week.html" class="btn btn-teal btn-toolbar nav-btn">
          Week
        </a>

        <a
          href="notes.html"
          class="btn btn-teal btn-toolbar nav-btn desktop-header-notes-link"
        >
          Notes
        </a>

        <div class="dropdown hidden md:block">
          <button
            type="button"
            class="btn btn-teal btn-toolbar nav-btn dropdown-toggle"
            data-dropdown-toggle
            aria-expanded="false"
          >
            Game <span class="caret">▾</span>
          </button>

          <div class="dropdown-menu">
            <a href="gamehub.html" class="btn btn-teal btn-toolbar nav-btn">
              Game Hub
            </a>

            <a href="game.html" class="btn btn-teal btn-toolbar nav-btn">
              Players
            </a>

            <a href="game_ratings.html" class="btn btn-teal btn-toolbar nav-btn">
              Ratings
            </a>

            <a href="matchups.html" class="btn btn-teal btn-toolbar nav-btn">
              Matchups
            </a>

            <a href="head_to_heads.html" class="btn btn-teal btn-toolbar nav-btn">
              Head to Heads
            </a>

            <a href="schedule.html" class="btn btn-teal btn-toolbar nav-btn">
              Schedule
            </a>

            <a href="standings.html" class="btn btn-teal btn-toolbar nav-btn">
              Standings
            </a>

            <a href="rankings.html" class="btn btn-teal btn-toolbar nav-btn">
              Rankings
            </a>

            <a href="records.html" class="btn btn-teal btn-toolbar nav-btn">
              Records
            </a>
          </div>
        </div>

        <a href="season.html" class="btn btn-teal btn-toolbar nav-btn">
          Season
        </a>

        <a href="settings.html" class="btn btn-teal btn-toolbar nav-btn">
          Settings
        </a>

        <button
          type="button"
          class="btn btn-ghost btn-toolbar ml-1 hidden md:inline-flex"
          data-export-button
        >
          Export
        </button>

        <label
          class="btn btn-ghost btn-toolbar cursor-pointer hidden md:inline-flex"
        >
          <span>Import</span>
          <input
            type="file"
            accept="application/json"
            class="hidden"
            data-import-input
          />
        </label>
      </div>
    </header>

    <!-- Inbox placeholder -->
    <div class="flex items-start justify-between gap-3 flex-wrap mb-3">
      <div>
        <h2 class="text-xl sm:text-2xl font-extrabold tracking-tight">
          Inbox
        </h2>

        <div class="muted text-xs">
          Messages, reminders, and captured items will eventually live here.
        </div>
      </div>
    </div>

    <div class="glass p-4">
      <div class="text-lg font-bold">Inbox</div>
      <div class="muted text-sm mt-1">
        This page is ready for Inbox features.
      </div>
    </div>
  </div>

  <div id="bottomToolbarMount"></div>
</body>
</html>
