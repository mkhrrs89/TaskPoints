<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TaskPoints — Notes</title>

  
  <link rel="stylesheet" href="assets/tailwind.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="preload" href="toolbar.js" as="script">
  <script src="toolbar.js" defer></script>

  <style>
    .notes-textarea{
      min-height: 60vh;
      resize: vertical;
    }
    .notes-tab-row{
      display:flex;
      gap:.5rem;
      flex-wrap:wrap;
      margin-bottom:.75rem;
    }
    .notes-tab-button[aria-selected="true"]{
      border-color: rgba(45, 212, 191, .45);
      box-shadow: inset 0 0 0 1px rgba(45, 212, 191, .35);
      background: rgba(15, 118, 110, .28);
      color: #ccfbf1;
    }
    .notes-tab-panel[hidden]{
      display:none !important;
    }
    .mood-notes-list{
      min-height: 60vh;
      border: 1px solid rgba(148, 163, 184, .25);
      border-radius: 14px;
      background: rgba(15, 23, 42, .22);
      padding: .9rem;
      font-size: .95rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body class="min-h-screen">
  <div class="mx-auto max-w-6xl p-3 sm:p-4 pb-16 md:pb-5">
    <div class="flex items-center justify-between gap-3 mb-3 md:hidden">
      <a href="index.html" class="flex items-center gap-3">
        <img src="assets/taskpoints-logo.png" alt="TaskPoints logo" class="w-10 h-10 rounded-2xl object-cover shrink-0 shadow-sm">
        <h1 class="text-2xl font-extrabold tracking-tight leading-tight">
          <span style="color:#fb923c;">Task</span><span style="color:#1e666d;">Points</span>
        </h1>
      </a>
      <div class="flex items-center gap-2">
        <button type="button" class="btn btn-ghost btn-toolbar" data-export-button>Export</button>
        <label class="btn btn-ghost btn-toolbar cursor-pointer">
          <span>Import</span>
          <input type="file" accept="application/json" class="hidden" data-import-input/>
        </label>
      </div>
    </div>

    <header class="mb-3">
      <div class="row items-center gap-3 sm:gap-4">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="hidden md:block p-2 rounded-2xl bg-slate-900/50 border border-slate-700/60 shadow-inner">
            <img src="assets/taskpoints-logo.png" alt="TaskPoints logo" class="w-10 h-10 rounded-2xl object-cover shrink-0">
          </div>
          <div class="min-w-0">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight flex items-center gap-2 page-title">Notes</h1>
            <p class="muted text-sm">Quick brain dump, outlines, and anything else you want saved.</p>
          </div>
        </div>

        <div class="toolbar header-nav mt-3 sm:mt-0">
          <a href="index.html" class="btn btn-teal btn-toolbar nav-btn">Main</a>
          <a href="today.html" class="btn btn-teal btn-toolbar nav-btn mobile-hide-header-today">Today</a>
          <a href="daily_sources.html" class="btn btn-teal btn-toolbar nav-btn">Sources</a>
          <a href="log.html" class="btn btn-teal btn-toolbar nav-btn">Log</a>
          <a href="week.html" class="btn btn-teal btn-toolbar nav-btn">Week</a>

          <div class="dropdown hidden md:block">
            <button type="button" class="btn btn-teal btn-toolbar dropdown-toggle nav-btn" data-dropdown-toggle aria-expanded="false">
              Game <span class="caret">▾</span>
            </button>
            <div class="dropdown-menu">
              <a href="gamehub.html" class="btn btn-teal btn-toolbar nav-btn">Game Hub</a>
              <a href="game.html" class="btn btn-teal btn-toolbar nav-btn">Players</a>
              <a href="standings.html" class="btn btn-teal btn-toolbar nav-btn">Standings</a>
              <a href="rankings.html" class="btn btn-teal btn-toolbar nav-btn">Rankings</a>
              <a href="matchups.html" class="btn btn-teal btn-toolbar nav-btn">Matchups</a>
              <a href="head_to_heads.html" class="btn btn-teal btn-toolbar nav-btn">Head to Heads</a>
              <a href="schedule.html" class="btn btn-teal btn-toolbar nav-btn">Schedule</a>
              <a href="game_ratings.html" class="btn btn-teal btn-toolbar nav-btn">Ratings</a>
              <a href="records.html" class="btn btn-teal btn-toolbar nav-btn">Records</a>
            </div>
          </div>

          <a href="projects.html" class="btn btn-teal btn-toolbar nav-btn">Projects</a>
          <a href="notes.html" class="btn btn-teal btn-toolbar nav-btn active">Notes</a>
          <a href="settings.html" class="btn btn-teal btn-toolbar nav-btn">Settings</a>
        </div>
      </div>
    </header>

    <section class="glass">
      <div class="notes-tab-row" role="tablist" aria-label="Notes tabs">
        <button
          id="generalNotesTab"
          type="button"
          class="btn btn-ghost btn-toolbar notes-tab-button"
          role="tab"
          aria-selected="true"
          aria-controls="generalNotesPanel"
          data-notes-tab="general">General Notes</button>
        <button
          id="moodNotesTab"
          type="button"
          class="btn btn-ghost btn-toolbar notes-tab-button"
          role="tab"
          aria-selected="false"
          aria-controls="moodNotesPanel"
          data-notes-tab="mood">Mood Notes</button>
      </div>

      <div id="generalNotesPanel" class="notes-tab-panel" role="tabpanel" aria-labelledby="generalNotesTab">
        <div class="flex items-center justify-between gap-2 mb-2">
          <label for="notesInput" class="font-semibold">Notes</label>
          <span id="notesStatus" class="text-xs muted">Saved</span>
        </div>
        <textarea
          id="notesInput"
          class="input w-full notes-textarea"
          placeholder="Start typing your notes, bullet points, or outlines here..."></textarea>
      </div>
      <div id="moodNotesPanel" class="notes-tab-panel" role="tabpanel" aria-labelledby="moodNotesTab" hidden>
        <label for="moodNotesList" class="font-semibold block mb-2">Mood Notes</label>
        <div id="moodNotesList" class="mood-notes-list" aria-live="polite">No mood notes yet.</div>
      </div>
    </section>
  </div>

  <script src="scoring_core.js"></script>
<script>
    const STORAGE_KEY = "taskpoints_v1";
    const NOTES_STORAGE_KEY = "taskpoints_notes_v1";
    const notesInput = document.getElementById("notesInput");
    const notesStatus = document.getElementById("notesStatus");
    const generalNotesTab = document.getElementById("generalNotesTab");
    const moodNotesTab = document.getElementById("moodNotesTab");
    const generalNotesPanel = document.getElementById("generalNotesPanel");
    const moodNotesPanel = document.getElementById("moodNotesPanel");
    const moodNotesList = document.getElementById("moodNotesList");
    let saveTimer = null;

    function getStoredState() {
      if (window.TaskPointsCore?.loadAppState) {
        return TaskPointsCore.loadAppState({ syncDerived: false, persistSync: false }).state || {};
      }
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? (JSON.parse(raw) || {}) : {};
      } catch (err) {
        console.error("Failed to load notes state", err);
        return {};
      }
    }

    function setStatus(message) {
      if (!notesStatus) return;
      notesStatus.textContent = message;
    }

    function saveNotes(immediate = false) {
      if (!notesInput) return;
      const value = notesInput.value || "";
      try {
        localStorage.setItem(NOTES_STORAGE_KEY, value);
      } catch (err) {
        console.error("Failed to cache notes", err);
      }
      if (window.TaskPointsCore?.saveAppState) {
        TaskPointsCore.saveAppState({ notes: value }, { storageKey: STORAGE_KEY, immediateWrite: immediate });
        window.TaskPointsCore?.flushPendingSaves?.();
      } else {
        try {
          const existing = getStoredState();
          existing.notes = value;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
        } catch (err) {
          console.error("Failed to save notes", err);
        }
      }
      setStatus("Saved");
    }

    function scheduleSave() {
      setStatus("Saving…");
      if (notesInput) {
        try {
          localStorage.setItem(NOTES_STORAGE_KEY, notesInput.value || "");
        } catch (err) {
          console.error("Failed to cache notes", err);
        }
      }
      if (saveTimer) window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => saveNotes(true), 400);
    }

    function loadNotes() {
      const state = getStoredState();
      if (notesInput) {
        const storedNotes = typeof state.notes === "string" ? state.notes : "";
        if (storedNotes) {
          notesInput.value = storedNotes;
          return;
        }
        try {
          const cached = localStorage.getItem(NOTES_STORAGE_KEY);
          if (typeof cached === "string") {
            notesInput.value = cached;
            if (cached.trim()) {
              saveNotes(true);
            }
          } else {
            notesInput.value = "";
          }
        } catch (err) {
          console.error("Failed to load cached notes", err);
          notesInput.value = "";
        }
      }
    }

    function formatCompactDate(date) {
      return `${date.getMonth() + 1}/${date.getDate()}/${String(date.getFullYear()).slice(-2)}`;
    }

    function buildMoodNotesText() {
      const state = getStoredState();
      const completions = Array.isArray(state.completions) ? state.completions : [];
      const moodEntries = completions
        .filter((entry) => entry && typeof entry === "object")
        .filter((entry) => typeof entry.title === "string" && entry.title.startsWith("Mood Score"))
        .map((entry) => {
          const rawNote = typeof entry.moodNotes === "string" ? entry.moodNotes.trim() : "";
          const completedDate = new Date(entry.completedAtISO);
          return {
            note: rawNote,
            completedDate,
            completedAtISO: entry.completedAtISO
          };
        })
        .filter((entry) => entry.note && !Number.isNaN(entry.completedDate.getTime()))
        .sort((a, b) => b.completedDate.getTime() - a.completedDate.getTime());

      if (!moodEntries.length) return "No mood notes yet.";

      const lines = [];
      let currentDateKey = "";
      moodEntries.forEach((entry) => {
        const dateKey = formatCompactDate(entry.completedDate);
        if (dateKey !== currentDateKey) {
          if (lines.length) lines.push("");
          lines.push(dateKey);
          currentDateKey = dateKey;
        }
        lines.push(`- ${entry.note}`);
      });
      return lines.join("\n");
    }

    function renderMoodNotes() {
      if (!moodNotesList) return;
      moodNotesList.textContent = buildMoodNotesText();
    }

    function setActiveTab(tab) {
      const showGeneral = tab !== "mood";
      if (generalNotesPanel) generalNotesPanel.hidden = !showGeneral;
      if (moodNotesPanel) moodNotesPanel.hidden = showGeneral;
      if (generalNotesTab) generalNotesTab.setAttribute("aria-selected", showGeneral ? "true" : "false");
      if (moodNotesTab) moodNotesTab.setAttribute("aria-selected", showGeneral ? "false" : "true");
      if (!showGeneral) renderMoodNotes();
    }

    loadNotes();
    setActiveTab("general");
    generalNotesTab?.addEventListener("click", () => setActiveTab("general"));
    moodNotesTab?.addEventListener("click", () => setActiveTab("mood"));
    notesInput?.addEventListener("input", scheduleSave);
    notesInput?.addEventListener("change", () => saveNotes(true));
    window.addEventListener("beforeunload", () => saveNotes(true));
    window.addEventListener("pagehide", () => saveNotes(true));
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") saveNotes(true);
    });
  </script>
</body>
</html>
