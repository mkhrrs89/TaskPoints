<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TaskPoints — Skills</title>

  <script src="scoring_core.js"></script>
  <link rel="stylesheet" href="assets/tailwind.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="preload" href="toolbar.js" as="script">
  <script src="toolbar.js" defer></script>
</head>

<body class="min-h-screen">
  <div class="mx-auto max-w-6xl p-3 sm:p-4 pb-16 md:pb-5">
    <div class="flex items-center justify-between gap-3 mb-3 md:hidden">
      <a href="index.html" class="flex items-center gap-3">
        <img src="assets/taskpoints-logo.png" alt="TaskPoints logo" class="w-10 h-10 rounded-2xl object-cover shrink-0 shadow-sm">
        <h1 class="text-2xl font-extrabold tracking-tight leading-tight">
          <span style="color:#fb923c;">Task</span><span style="color:#1e666d;">Points</span>
        </h1>
      </a>
      <div class="flex items-center gap-2">
        <button type="button" class="btn btn-ghost btn-toolbar" data-export-button>Export</button>
        <label class="btn btn-ghost btn-toolbar cursor-pointer">
          <span>Import</span>
          <input type="file" accept="application/json" class="hidden" data-import-input/>
        </label>
      </div>
    </div>

    <header class="mb-3">
      <div class="row items-center gap-3 sm:gap-4">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="hidden md:block p-2 rounded-2xl bg-slate-900/50 border border-slate-700/60 shadow-inner">
            <img src="assets/taskpoints-logo.png" alt="TaskPoints logo" class="w-10 h-10 rounded-2xl object-cover shrink-0">
          </div>
          <div class="min-w-0">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight flex items-center gap-2 page-title">Skills</h1>
            <p class="muted text-sm">Unique skill names and totals gathered from stored data.</p>
          </div>
        </div>

        <div class="toolbar header-nav mt-3 sm:mt-0">
          <a href="index.html" class="btn btn-teal btn-toolbar nav-btn">Main</a>
          <a href="today.html" class="btn btn-teal btn-toolbar nav-btn mobile-hide-header-today">Today</a>
          <a href="daily_sources.html" class="btn btn-teal btn-toolbar nav-btn">Sources</a>
          <a href="log.html" class="btn btn-teal btn-toolbar nav-btn">Log</a>
          <a href="week.html" class="btn btn-teal btn-toolbar nav-btn">Week</a>

          <div class="dropdown hidden md:block">
            <button type="button" class="btn btn-teal btn-toolbar dropdown-toggle nav-btn" data-dropdown-toggle aria-expanded="false">
              Game <span class="caret">▾</span>
            </button>
            <div class="dropdown-menu">
              <a href="gamehub.html" class="btn btn-teal btn-toolbar nav-btn">Game Hub</a>
              <a href="game.html" class="btn btn-teal btn-toolbar nav-btn">Players</a>
              <a href="standings.html" class="btn btn-teal btn-toolbar nav-btn">Standings</a>
              <a href="matchups.html" class="btn btn-teal btn-toolbar nav-btn">Matchups</a>
              <a href="schedule.html" class="btn btn-teal btn-toolbar nav-btn">Schedule</a>
              <a href="game_ratings.html" class="btn btn-teal btn-toolbar nav-btn">Ratings</a>
              <a href="records.html" class="btn btn-teal btn-toolbar nav-btn">Records</a>
            </div>
          </div>

          <a href="projects.html" class="btn btn-teal btn-toolbar nav-btn">Projects</a>
          <a href="notes.html" class="btn btn-teal btn-toolbar nav-btn">Notes</a>
          <a href="skills.html" class="btn btn-teal btn-toolbar nav-btn active">Skills</a>
          <a href="settings.html" class="btn btn-teal btn-toolbar nav-btn">Settings</a>
        </div>
      </div>
    </header>

    <section class="glass">
      <div class="flex items-center justify-between gap-2 mb-2">
        <h2 class="text-lg font-semibold">All Skills</h2>
        <span id="skillsCount" class="text-xs muted"></span>
      </div>
      <div class="rounded-xl border border-slate-700/70 bg-slate-900/35 overflow-hidden">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b border-slate-700/70 bg-slate-900/55">
              <th scope="col" class="px-3 py-2 text-xs font-semibold uppercase tracking-wide text-slate-300">Skill</th>
              <th scope="col" class="px-3 py-2 text-xs font-semibold uppercase tracking-wide text-slate-300 text-right">Count</th>
            </tr>
          </thead>
          <tbody id="skillsList"></tbody>
        </table>
      </div>
      <p id="skillsEmpty" class="muted text-sm hidden">No skills found yet. Add skills on tasks to populate this list.</p>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "taskpoints_v1";

    function loadState() {
      if (window.TaskPointsCore?.loadAppState) {
        return TaskPointsCore.loadAppState({ syncDerived: false, persistSync: false }).state || {};
      }
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? (JSON.parse(raw) || {}) : {};
      } catch (err) {
        console.error("Failed to load TaskPoints state", err);
        return {};
      }
    }

    function normalizeSkillName(rawSkill) {
      const cleanedSkill = typeof rawSkill === 'string' ? rawSkill.trim() : '';
      if (!cleanedSkill) return null;
      return {
        key: cleanedSkill.toLocaleLowerCase(),
        display: cleanedSkill,
      };
    }

    function gatherSkillRowCollections(state) {
      const collections = [];

      function scanValue(value) {
        if (Array.isArray(value)) {
          if (
            value.some((entry) =>
              entry &&
              typeof entry === 'object' &&
              Object.prototype.hasOwnProperty.call(entry, 'skill') &&
              Object.prototype.hasOwnProperty.call(entry, 'pts')
            )
          ) {
            collections.push(value);
          }

          value.forEach((entry) => {
            if (entry && typeof entry === 'object') scanValue(entry);
          });
          return;
        }

        if (!value || typeof value !== 'object') return;
        Object.values(value).forEach(scanValue);
      }

      scanValue(state);
      return collections;
    }

    function collectSkillTotals(state) {
      const totals = new Map();
      const skillCollections = gatherSkillRowCollections(state);

      skillCollections.forEach((rows) => {
        rows.forEach((row) => {
          const normalized = normalizeSkillName(row?.skill);
          if (!normalized) return;

          const existing = totals.get(normalized.key);
          if (existing) {
            existing.count += 1;
            return;
          }

          totals.set(normalized.key, {
            display: normalized.display,
            count: 1,
          });
        });
      });

      return [...totals.values()].sort((a, b) =>
        a.display.localeCompare(b.display, undefined, { sensitivity: 'base' })
      );
    }

    function renderSkills() {
      const state = loadState();
      const skills = collectSkillTotals(state);

      const list = document.getElementById('skillsList');
      const empty = document.getElementById('skillsEmpty');
      const count = document.getElementById('skillsCount');

      if (!list || !empty || !count) return;

      if (!skills.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        count.textContent = '0 skills';
        return;
      }

      empty.classList.add('hidden');
      count.textContent = `${skills.length} skill${skills.length === 1 ? '' : 's'}`;
      list.innerHTML = skills
        .map(
          (skill) => `
            <tr class="border-b border-slate-700/50 last:border-b-0">
              <td class="px-3 py-2 font-medium">${skill.display}</td>
              <td class="px-3 py-2 text-right tabular-nums">${skill.count}</td>
            </tr>
          `
        )
        .join('');
    }

    renderSkills();
  </script>
</body>
</html>
