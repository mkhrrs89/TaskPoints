<script>
const STORAGE_KEY="taskpoints_v1";
let pageStateCache = null;
let pageStateCacheDirty = true;
let pageStateFreshReadCount = 0;
const $=id=>document.getElementById(id);
const DAYS_PER_PAGE = 15;
let currentLogPage = 0;

function fromKey(key){
  if(!key || typeof key !== 'string') return null;
  const [y,m,d]=key.split('-').map(Number);
  if(!y||!m||!d) return null;
  const date=new Date(y,m-1,d);
  date.setHours(0,0,0,0);
  return isNaN(date)?null:date;
}

function dateKey(date){
  if(!(date instanceof Date) || isNaN(date)) return null;
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function todayKey(){
  const d=new Date();
  d.setHours(0,0,0,0);
  return dateKey(d);
}

function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); x.setHours(0,0,0,0); return x; }

function safeCompletionDateKey(completion){
  if(!completion || !completion.completedAtISO) return null;
  const when=new Date(completion.completedAtISO);
  if(isNaN(when)) return null;
  return dateKey(when);
}

function getCompletionDateKey(entry) {
  const iso = typeof entry?.completedAtISO === 'string' ? entry.completedAtISO : '';
  if (iso) {
    const d = new Date(iso);
    if (!Number.isNaN(d.getTime())) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
  }
  if (typeof entry?.dayKey === 'string' && entry.dayKey) return entry.dayKey;
  return '';
}

function computePreviousDueDate(task, completionKey){
  if(!task) return null;
  const rec = task.recurrence || {};
  const mode = rec.mode || 'none';
  if (mode === 'none') return completionKey || task.dueDateISO || todayKey();

  const nextKey = task.dueDateISO || null;
  const anchorKey = nextKey || completionKey || todayKey();
  const anchorDate = fromKey(anchorKey);
  if(!anchorDate) return null;

  const count = Number.isFinite(rec.customCount) && rec.customCount > 0 ? rec.customCount : 1;
  let prevDate = null;

  if (mode === 'daily') {
    prevDate = addDays(anchorDate, -1);
  } else if (mode === 'everyWeekday') {
    prevDate = addDays(anchorDate, -1);
    while(prevDate.getDay() === 0 || prevDate.getDay() === 6){
      prevDate = addDays(prevDate, -1);
    }
  } else if (mode === 'weekly') {
    prevDate = addDays(anchorDate, -7);
  } else if (mode === 'monthly') {
    prevDate = new Date(anchorDate);
    prevDate.setMonth(prevDate.getMonth() - 1);
    prevDate.setHours(0,0,0,0);
  } else if (mode === 'yearly') {
    prevDate = new Date(anchorDate);
    prevDate.setFullYear(prevDate.getFullYear() - 1);
    prevDate.setHours(0,0,0,0);
  } else if (mode === 'custom') {
    const unit = rec.customUnit || 'day';
    if (unit === 'day') {
      prevDate = addDays(anchorDate, -count);
    } else if (unit === 'week') {
      prevDate = addDays(anchorDate, -count * 7);
    } else if (unit === 'month') {
      prevDate = new Date(anchorDate);
      prevDate.setMonth(prevDate.getMonth() - count);
      prevDate.setHours(0,0,0,0);
    } else if (unit === 'year') {
      prevDate = new Date(anchorDate);
      prevDate.setFullYear(prevDate.getFullYear() - count);
      prevDate.setHours(0,0,0,0);
    }
  }

  return prevDate ? dateKey(prevDate) : null;
}

function sleepBonus(score) {
  if (window.TaskPointsCore?.sleepBonus) {
    return TaskPointsCore.sleepBonus(score, state);
  }
  if (score >= 100) return 3;
  if (score >= 98) return 2;
  if (score >= 95) return 1;
  return 0;
}

function getSleepInfo(entry) {
  const title = typeof entry?.title === 'string' ? entry.title : '';
  const match = title.match(/^Sleep Score\s*\((\d+(?:\.\d+)?)\)/i);
  const score = match ? Number(match[1]) : null;

  const restedRaw = entry && Object.prototype.hasOwnProperty.call(entry, 'sleepRested')
    ? Number(entry.sleepRested)
    : 0;
  const rested = Number.isFinite(restedRaw) ? restedRaw : 0;

  return { score, rested };
}

function sleepPoints(score, rested = 0) {
  if (window.TaskPointsCore?.sleepPoints) {
    return TaskPointsCore.sleepPoints(score, rested, state);
  }
  if (!Number.isFinite(score)) return 0;
  const base = score / 10;
  const bonus = sleepBonus(score);
  return base + bonus + (Number.isFinite(rested) ? rested : 0);
}

function getWorkInfo(entry) {
  const match = entry?.title?.match(/\(([^)]+)\)/);
  const score = match ? Number(match[1]) : null;

  const hoursRaw = entry && Object.prototype.hasOwnProperty.call(entry, 'workHours')
    ? Number(entry.workHours)
    : 0;
  const hours = Number.isFinite(hoursRaw) ? hoursRaw : 0;

  return { score, hours };
}

function workHoursBonus(hours = 0) {
  if (window.TaskPointsCore?.workHoursBonus) {
    return TaskPointsCore.workHoursBonus(hours, state);
  }
  if (!Number.isFinite(hours)) return 0;
  return Math.max(0, hours) * 10;
}

function workPoints(score, hours = 0) {
  if (window.TaskPointsCore?.workPoints) {
    return TaskPointsCore.workPoints(score, hours, state);
  }
  if (!Number.isFinite(score)) return 0;
  return score + workHoursBonus(hours);
}


function invalidatePageStateCache() {
  pageStateCacheDirty = true;
}

function readPageStateFresh(){
  pageStateFreshReadCount += 1;
  if (window.TP_DEBUG_PERF) {
    console.debug('[TP_DEBUG_PERF][log] fresh storage parse #' + pageStateFreshReadCount);
  }
  console.time('log:load');
  try {
    const raw = localStorage.getItem(STORAGE_KEY);

    if (!raw) {
      pageStateCache = {
        tasks: [],
        completions: [],
        players: [],
        habits: [],
        flexActions: [],
        matchups: [],
        gameHistory: [],
        schedule: [],
        opponentDripSchedules: [],
        workHistory: [],
        youImageId: "",
        youName: "",
        youPrimaryColor: "#1a383b",
        youSecondaryColor: "#254c52",
        projects: [],
        notes: "",
        habitTagColors: {},
        scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
          ? TaskPointsCore.normalizeScoringSettings({})
        : {}
        };
      pageStateCacheDirty = false;
      return pageStateCache;
    }

    const p = JSON.parse(raw);
    pageStateCache = {
      tasks:       Array.isArray(p.tasks)       ? p.tasks       : [],
      completions: Array.isArray(p.completions) ? p.completions : [],
      players:     Array.isArray(p.players)     ? p.players     : [],
      habits:      Array.isArray(p.habits)      ? p.habits      : [],
      flexActions: Array.isArray(p.flexActions) ? p.flexActions : [],
      matchups:    Array.isArray(p.matchups)    ? p.matchups    : [],
      gameHistory: Array.isArray(p.gameHistory) ? p.gameHistory : [],
      schedule:    Array.isArray(p.schedule)    ? p.schedule    : [],
      opponentDripSchedules: Array.isArray(p.opponentDripSchedules) ? p.opponentDripSchedules : [],
      workHistory: Array.isArray(p.workHistory) ? p.workHistory : [],
      youImageId:  typeof p.youImageId === "string" ? p.youImageId : "",
      youName:     typeof p.youName === "string" ? p.youName : "",
      youPrimaryColor: normalizeHexColor(p.youPrimaryColor) || "#1a383b",
      youSecondaryColor: normalizeHexColor(p.youSecondaryColor) || "#254c52",
      projects: Array.isArray(p.projects) ? p.projects : [],
      notes:       typeof p.notes === "string" ? p.notes : "",
      habitTagColors: normalizeHabitTagColors(p.habitTagColors),
      scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
        ? TaskPointsCore.normalizeScoringSettings(p.scoringSettings || {})
      : (p.scoringSettings || {})
    };
    pageStateCacheDirty = false;
    return pageStateCache;
  } catch {
    pageStateCache = {
      tasks: [],
      completions: [],
      players: [],
      habits: [],
      flexActions: [],
      matchups: [],
      gameHistory: [],
      schedule: [],
      opponentDripSchedules: [],
      workHistory: [],
      youImageId: "",
      youName: "",
      youPrimaryColor: "#1a383b",
      youSecondaryColor: "#254c52",
      projects: [],
      notes: "",
      habitTagColors: {},
      scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
        ? TaskPointsCore.normalizeScoringSettings({})
      : {}
      };
    pageStateCacheDirty = false;
    return pageStateCache;
  } finally {
    console.timeEnd('log:load');
  }
}

function getPageState() {
  return pageStateCacheDirty ? readPageStateFresh() : pageStateCache;
}

function load(){
  return getPageState();
}

let state = normalizeState(load());
  
function normalizeHexColor(value) {
  if (!value) return null;
  let hex = String(value).trim();
  if (!hex) return null;
  if (!hex.startsWith('#')) hex = `#${hex}`;
  if (!/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(hex)) return null;
  if (hex.length === 4) {
    hex = `#${hex.slice(1).split('').map((c) => c + c).join('')}`;
  }
  return hex.toLowerCase();
}

function normalizeHabitTagColors(value) {
  if (!value || typeof value !== 'object') return {};
  const next = {};
  Object.entries(value).forEach(([tag, color]) => {
    const normalized = normalizeHexColor(color);
    if (normalized) next[String(tag)] = normalized;
  });
  return next;
}

function normalizeHabit(habit) {
  if (!habit || typeof habit !== 'object') return habit;
  return {
    ...habit,
    tag: typeof habit.tag === 'string' ? habit.tag.trim() : ''
  };
}

function normalizeState(s) {
  return {
    tasks:       Array.isArray(s.tasks)       ? s.tasks       : [],
    completions: Array.isArray(s.completions) ? s.completions : [],
    players:     Array.isArray(s.players)     ? s.players     : [],
    habits:      Array.isArray(s.habits)      ? s.habits.map(normalizeHabit)      : [],
    flexActions: Array.isArray(s.flexActions) ? s.flexActions : [],
    gameHistory: Array.isArray(s.gameHistory) ? s.gameHistory : [],
    matchups:    Array.isArray(s.matchups)    ? s.matchups    : [],
    schedule:    Array.isArray(s.schedule)    ? s.schedule    : [],
    opponentDripSchedules: Array.isArray(s.opponentDripSchedules) ? s.opponentDripSchedules : [],
    workHistory: Array.isArray(s.workHistory) ? s.workHistory : [],
    youImageId:  typeof s.youImageId === "string" ? s.youImageId : "",
    youName: typeof s.youName === "string" ? s.youName : "",
    youPrimaryColor: normalizeHexColor(s.youPrimaryColor) || "#1a383b",
    youSecondaryColor: normalizeHexColor(s.youSecondaryColor) || "#254c52",
    projects: Array.isArray(s.projects) ? s.projects : [],
    notes: typeof s.notes === "string" ? s.notes : "",
    habitTagColors: normalizeHabitTagColors(s.habitTagColors),
    scoringSettings: window.TaskPointsCore?.normalizeScoringSettings
      ? TaskPointsCore.normalizeScoringSettings(s.scoringSettings || {})
      : (s.scoringSettings || {})
  };
}

function saveMerged(partial) {
  try {
    const existing = getPageState() || {};

    // Merge top-level keys so we don't wipe fields this page didn't load
    const merged = { ...existing, ...partial };

    // IMPORTANT: snapshot-save (no union merge), so deletions stick
    if (window.TaskPointsCore?.saveStateSnapshot) {
      const nextState = TaskPointsCore.saveStateSnapshot(merged, { storageKey: STORAGE_KEY }).state;
      pageStateCache = nextState;
      pageStateCacheDirty = false;
      return nextState;
    }

    // Fallback if snapshot saver isn't available
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    pageStateCache = merged;
    pageStateCacheDirty = false;
    return merged;
  } catch (e) {
    invalidatePageStateCache();
    console.error("saveMerged failed", e);
    return partial;
  }
}


function getCompletionPoints(entry) {
  if (window.TaskPointsCore?.pointsForCompletion) {
    return TaskPointsCore.pointsForCompletion(entry);
  }
  return Number(entry?.points) || 0;
}

function buildVisibleInertiaEntries(completions, pageKeys) {
  if (!Array.isArray(pageKeys) || pageKeys.length === 0) return [];
  if (!window.TaskPointsCore?.aggregateCompletionsByDate) return [];
  const { dailyTotals } = TaskPointsCore.aggregateCompletionsByDate(completions, state);
  return pageKeys.flatMap(dateKeyStr => {
    const { inertia, average } = TaskPointsCore.computeInertia(dailyTotals, dateKeyStr, state);
    if (!Number.isFinite(inertia) || Math.abs(inertia) < 0.0001) return [];
    const date = fromKey(dateKeyStr);
    if (!date) return [];
    const iso = new Date(date.getTime() + 12 * 3600 * 1000).toISOString();
    const rounded = window.TaskPointsCore?.roundPoints
      ? TaskPointsCore.roundPoints(inertia, 2)
      : Math.round(inertia * 10) / 10;
    return [{
      id: `inertia:${dateKeyStr}`,
      title: `Inertia Bonus — Avg ${Number(average || 0).toFixed(1)}`,
      points: rounded,
      completedAtISO: iso,
      source: 'inertia',
      category: 'inertia'
    }];
  });
}

function syncDerivedPointsIfNeeded() {
  if (!window.TaskPointsCore?.syncDerivedPoints) return false;
  const derivedSync = TaskPointsCore.syncDerivedPoints(state);
  state = derivedSync.state;
  if (!derivedSync.changed) return false;
  if (window.TaskPointsCore?.saveAppState) {
    state = TaskPointsCore.saveStateSnapshot(state).state;
  } else if (window.TaskPointsCore?.mergeAndSaveState) {
    state = TaskPointsCore.saveStateSnapshot(state).state;
  } else {
    state = saveMerged(state);
  }
  return true;
}


function migrateSleepEntriesForBonus() {
  if (!state || !Array.isArray(state.completions)) return;

  let changed = false;

  state.completions.forEach(c => {
    if (!c || !c.title || !c.title.startsWith('Sleep Score')) return;

    const { score, rested } = getSleepInfo(c);
    if (!Number.isFinite(score)) return;

    const restVal = Number.isFinite(rested) ? rested : 0;
    const newPts = sleepPoints(score, restVal);

    if (!Number.isFinite(c.sleepRested)) {
      c.sleepRested = restVal;
      changed = true;
    }

    if (Math.abs((Number(c.points) || 0) - newPts) > 0.0001) {
      c.points = newPts;
      changed = true;
    }
  });

  if (changed) save();
  return changed;
}

function migrateWorkEntriesForHours() {
  if (!state || !Array.isArray(state.completions)) return;

  let changed = false;

  state.completions.forEach(c => {
    if (!c || !c.title || !c.title.startsWith('Work Score')) return;

    const { score, hours } = getWorkInfo(c);
    const safeHours = Number.isFinite(hours) ? Math.max(0, hours) : 0;
    const safeScore = Number.isFinite(score) ? score : Number(c.points) || 0;
    const newPts = workPoints(safeScore, safeHours);

    if (!Number.isFinite(c.workHours) || c.workHours !== safeHours) {
      c.workHours = safeHours;
      changed = true;
    }

    if (c.source !== 'work') {
      c.source = 'work';
      changed = true;
    }

    const desiredTitle = Number.isFinite(score)
      ? `Work Score (${score}) — Hours ${safeHours}`
      : c.title;
    if (desiredTitle !== c.title) {
      c.title = desiredTitle;
      changed = true;
    }

    if (Math.abs((Number(c.points) || 0) - newPts) > 0.0001) {
      c.points = newPts;
      changed = true;
    }
  });

  if (changed) save();
  return changed;
}

function save() {
  state = normalizeState(state);
  state = saveMerged(state);
}

function formatDayLabel(key) {
  if (!key) return 'Unknown date';
  const date = fromKey(key);
  return date
    ? date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
    : key;
}

function getBaseRows() {
  return (state.completions || [])
    .slice()
    .filter(Boolean)
    .sort((a,b)=> new Date(b.completedAtISO)-new Date(a.completedAtISO));
}

function getLogPageScope(baseRows) {
  const dayKeys = Array.from(new Set(baseRows.map(getCompletionDateKey).filter(Boolean)));
  const totalPages = Math.max(1, Math.ceil(Math.max(dayKeys.length, 1) / DAYS_PER_PAGE));
  if (!Number.isFinite(currentLogPage)) currentLogPage = 0;
  currentLogPage = Math.min(Math.max(currentLogPage, 0), Math.max(totalPages - 1, 0));
  const pageStart = currentLogPage * DAYS_PER_PAGE;
  const pageEnd = pageStart + DAYS_PER_PAGE;
  const pageKeys = dayKeys.slice(pageStart, pageEnd);
  const pageKeySet = new Set(pageKeys);
  const visibleBaseRows = baseRows.filter((entry) => pageKeySet.has(getCompletionDateKey(entry)));
  return { dayKeys, totalPages, pageStart, pageEnd, pageKeys, visibleBaseRows };
}

function renderRows(rows, dayKeys, totalPages, pageStart, pageEnd) {
  const list=$('logList'), empty=$('empty'), pagination=$('logPagination');
  list.innerHTML='';
  if (pagination) pagination.innerHTML = '';

  empty.style.display='none';
  let lastDayKey = null;
  const listFrag = document.createDocumentFragment();

  rows.forEach((c)=>{
    const completionDate = new Date(c.completedAtISO);
    const completionKey = getCompletionDateKey(c);
    if (completionKey && completionKey !== lastDayKey) {
      const divider = document.createElement('div');
      divider.className = 'day-divider';
      divider.innerHTML = `<span>${completionDate.toLocaleDateString(undefined, {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      })}</span>`;
      listFrag.appendChild(divider);
      lastDayKey = completionKey;
    }

    const row=document.createElement('div');
    row.className='row text-sm';

    const isHabit = (c.source === 'habit');
    const isVice  = (c.source === 'vice');
    const isFlex  = (c.source === 'flex');
    const isWork = c.source === 'work' || (c.title && c.title.startsWith('Work Score'));
    const isSleep = c.title && c.title.startsWith('Sleep Score');
    const isInertia = c.source === 'inertia' || c.category === 'inertia';
    const baseSrc = isHabit ? 'Habit' : isVice ? 'Vice' : isFlex ? 'Flex' : isWork ? 'Work' : 'Task';
    const category = c.category
      || (isInertia ? 'inertia' : (window.TaskPointsCore?.categorizeCompletion ? TaskPointsCore.categorizeCompletion(c) : null));
    const srcMap = {
      sleep: 'Sleep',
      calories: 'Diet',
      mood: 'Mood',
      habits: 'Habit',
      vices: 'Vices',
      flex: 'Flex',
      work: 'Work',
      game: 'Game',
      inertia: 'Inertia',
      tasks: 'Task'
    };
    const src = srcMap[category] || baseSrc;
    const canDelete = (baseSrc === 'Task' || baseSrc === 'Flex' || isHabit || isVice); // allow delete for tasks, flex, habits, vices
    const canEditDate = (!isHabit && !isVice && !isInertia);      // allow date-edit for tasks + sleep + flex
    const displayPoints = getCompletionPoints(c);
    const displayTitle = (c.source === 'vice' && typeof c.title === 'string' && c.title.startsWith('[Habit]'))
      ? c.title.replace('[Habit]', '[Vice]')
      : c.title;

    row.innerHTML = `
  <div>${new Date(c.completedAtISO).toLocaleString()}</div>
  <div>${escapeHtml(displayTitle)}</div>
  <div class="font-semibold">${displayPoints.toLocaleString()}</div>
  <div>${src}</div>
  <div class="flex gap-1 justify-center">
    ${canEditDate ? `<button class="btn" data-edit-date-id="${c.id}">📅</button>` : ''}
    ${isSleep ? `<button class="btn" data-edit-sleep-id="${c.id}">✎</button>` : ''}
    ${canDelete ? `<button class="btn" data-del-id="${c.id}">✕</button>` : ''}
  </div>
  <div class="text-xs text-zinc-400 truncate">${c.id}</div>
`;

    listFrag.appendChild(row);

    // Divider line between entries (very tight)
    const divider = document.createElement('div');
    divider.className = 'h-px bg-zinc-800 my-px opacity-40';
    listFrag.appendChild(divider);
  });

  list.appendChild(listFrag);

  if (pagination) {
    if (totalPages <= 1) {
      pagination.style.display = 'none';
    } else {
      const rangeStart = dayKeys[pageStart];
      const rangeEnd = dayKeys[Math.min(pageEnd, dayKeys.length) - 1];
      pagination.style.display = 'flex';
      pagination.innerHTML = `
        <div class="flex items-center gap-2">
          <button class="btn" data-page="prev" ${currentLogPage === 0 ? 'disabled' : ''}>← Newer</button>
          <button class="btn" data-page="next" ${currentLogPage >= totalPages - 1 ? 'disabled' : ''}>Older →</button>
        </div>
        <div class="muted">
          Page ${currentLogPage + 1} of ${totalPages} · ${formatDayLabel(rangeStart)} – ${formatDayLabel(rangeEnd)}
        </div>
      `;
      pagination.querySelectorAll('button[data-page]').forEach(btn => {
        btn.onclick = () => {
          const action = btn.getAttribute('data-page');
          const next = action === 'prev' ? currentLogPage - 1 : currentLogPage + 1;
          const clamped = Math.min(Math.max(next, 0), Math.max(totalPages - 1, 0));
          if (clamped === currentLogPage) return;
          currentLogPage = clamped;
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
      });
    }
  }

  // Hook up delete buttons
  list.querySelectorAll('button[data-del-id]').forEach(btn=>{
    btn.onclick = () => deleteCompletion(btn.getAttribute('data-del-id'));
  });

  // Hook up edit-sleep buttons
  list.querySelectorAll('button[data-edit-sleep-id]').forEach(btn=>{
    btn.onclick = () => editSleepScore(btn.getAttribute('data-edit-sleep-id'));
  });

  // Hook up edit-date buttons
  list.querySelectorAll('button[data-edit-date-id]').forEach(btn=>{
    btn.onclick = () => editCompletionDate(btn.getAttribute('data-edit-date-id'));
  });
}

function renderBaseOnly(){
  const perfStart = performance.now();
  const empty=$('empty'), pagination=$('logPagination'), list=$('logList');
  const baseRows = getBaseRows();
  if(!baseRows.length){
    list.innerHTML = '';
    empty.style.display='block';
    if (pagination) {
      pagination.innerHTML = '';
      pagination.style.display = 'none';
    }
    if (window.TP_DEBUG_PERF) console.log('[log:perf] renderBaseOnlyMs', (performance.now() - perfStart).toFixed(1));
    return;
  }

  const { dayKeys, totalPages, pageStart, pageEnd, visibleBaseRows } = getLogPageScope(baseRows);
  if (baseRows.length > 0 && visibleBaseRows.length === 0 && currentLogPage !== 0) {
    currentLogPage = 0;
    return renderBaseOnly();
  }
  renderRows(visibleBaseRows, dayKeys, totalPages, pageStart, pageEnd);
  if (window.TP_DEBUG_PERF) console.log('[log:perf] renderBaseOnlyMs', (performance.now() - perfStart).toFixed(1));
}

function renderFull(){
  const perfStart = performance.now();
  const empty=$('empty'), pagination=$('logPagination'), list=$('logList');
  const baseRows = getBaseRows();
  if(!baseRows.length){
    list.innerHTML = '';
    empty.style.display='block';
    if (pagination) {
      pagination.innerHTML = '';
      pagination.style.display = 'none';
    }
    if (window.TP_DEBUG_PERF) console.log('[log:perf] renderFullMs', (performance.now() - perfStart).toFixed(1));
    return;
  }

  const { dayKeys, totalPages, pageStart, pageEnd, pageKeys, visibleBaseRows } = getLogPageScope(baseRows);
  const visibleInertiaRows = buildVisibleInertiaEntries(baseRows, pageKeys);
  const visibleRows = [...visibleBaseRows, ...visibleInertiaRows]
    .sort((a,b)=> new Date(b.completedAtISO)-new Date(a.completedAtISO));

  if (window.TP_DEBUG_PERF) {
    console.log('[log:pageScope]', {
      completions: Array.isArray(state.completions) ? state.completions.length : 0,
      baseRows: baseRows.length,
      dayKeys: dayKeys.length,
      currentPage: currentLogPage + 1,
      pageKeys: pageKeys.length,
      visibleBaseRows: visibleBaseRows.length,
      visibleInertiaRows: visibleInertiaRows.length
    });
  }

  if (baseRows.length > 0 && visibleRows.length === 0 && currentLogPage !== 0) {
    currentLogPage = 0;
    return renderFull();
  }

  renderRows(visibleRows, dayKeys, totalPages, pageStart, pageEnd);
  if (window.TP_DEBUG_PERF) console.log('[log:perf] renderFullMs', (performance.now() - perfStart).toFixed(1));
}

function render(){
  if (logEnhancedReady) return renderFull();
  return renderBaseOnly();
}

function escapeHtml(s){ 
  return String(s).replace(/[&<>"']/g, m=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[m]));
}

function niceISO(iso) {
  try {
    const d = new Date(iso);
    if (!iso || isNaN(d.getTime())) return 'Invalid date';
    return d.toLocaleString(undefined, {
      year: 'numeric',
      month: 'short',
      day: 'numeric',
      hour: 'numeric',
      minute: '2-digit'
    });
  } catch {
    return String(iso || '');
  }
}

  
function deleteCompletion(token){
  if (!token) return;

  const key = String(token);

  // Find by id OR taskId, because older habit logs sometimes used random ids
  // while taskId stayed stable (habit:ID:YYYY-MM-DD).
  const idx = (state.completions || []).findIndex(c =>
    String(c?.id ?? '') === key || String(c?.taskId ?? '') === key
  );

  if (idx === -1) {
    console.warn('[log delete] completion not found for token:', key);
    return;
  }

  const c = state.completions[idx];

  const isHabitOrVice = (c?.source === 'habit' || c?.source === 'vice');

  // Helper: parse habitId/dayKey from completion or its taskId
  const parseHabitRef = (comp) => {
    let habitId = comp?.habitId || null;
    let dayKey  = comp?.dayKey  || null;

    const raw = String(comp?.taskId || comp?.id || '');
    const m = raw.match(/^habit:([^:]+):(\d{4}-\d{2}-\d{2})$/);
    if (m) {
      if (!habitId) habitId = m[1];
      if (!dayKey)  dayKey  = m[2];
    }

    return { habitId, dayKey };
  };

  if (isHabitOrVice) {
    const { habitId, dayKey } = parseHabitRef(c);

    const label = (c.source === 'vice') ? 'vice' : 'habit';
    const title = (c.title || '').replace(/^\[[^\]]+\]\s*/, '');
    const when  = niceISO(c.completedAtISO);

    const ok = confirm(`Delete this ${label} log entry?\n\n${title}\n${when}`);
    if (!ok) return;

    // Remove ONLY this one logged instance
    state.completions.splice(idx, 1);

    // Now also update habit backing state so it doesn't "snap back"
    if (habitId && dayKey && Array.isArray(state.habits)) {
      const h = state.habits.find(x => x && x.id === habitId);
      if (h) {
        h.doneKeys   = Array.isArray(h.doneKeys) ? h.doneKeys : [];
        h.failedKeys = Array.isArray(h.failedKeys) ? h.failedKeys : [];

        // If there are still other completion rows for this same habit/day,
        // keep done/failed markers. If this was the LAST one, clear markers.
        const stillHasSameDay = (state.completions || []).some(x => {
          if (!x) return false;
          if (x.source !== 'habit' && x.source !== 'vice') return false;

          const ref = parseHabitRef(x);
          return ref.habitId === habitId && ref.dayKey === dayKey;
        });

        if (!stillHasSameDay) {
          h.doneKeys   = h.doneKeys.filter(k => k !== dayKey);
          h.failedKeys = h.failedKeys.filter(k => k !== dayKey);
        }

        h.updatedAtISO = new Date().toISOString();
      }
    }

    save();
    render();
    return;
  }

  // ---- Original task/flex deletion logic (kept) ----
  const ok = confirm(`Delete entry?\n\n${(c.title || 'Untitled')}\n${niceISO(c.completedAtISO)}`);
  if (!ok) return;

  if (c.taskId) {
    const t = (state.tasks || []).find(x => x.id === c.taskId);
    if (t) {
      if (t.counts && t.counts > 0) {
        t.counts = Math.max(0, (t.counts || 0) - 1);
      } else {
        const newDue = computePreviousDueDate(t, c.completedAtISO);
        if (newDue) t.dueDateISO = newDue.toISOString();
      }
    }
  }

  state.completions.splice(idx, 1);
  save();
  render();
}


function editCompletionDate(id){
  const entry = state.completions.find(c => c.id === id);
  if (!entry) return;

  const oldDate = new Date(entry.completedAtISO);
  if (isNaN(oldDate)) {
    alert('This entry has an invalid date.');
    return;
  }

  // Pre-fill with current completion date as YYYY-MM-DD
  const current = oldDate.toISOString().slice(0, 10);
  const input = prompt('Edit completion date (YYYY-MM-DD):', current);
  if (input === null) return; // user cancelled

  // Basic format check
  if (!/^\d{4}-\d{2}-\d{2}$/.test(input)) {
    alert('Please use the format YYYY-MM-DD (e.g. 2025-11-23).');
    return;
  }

  const newDate = new Date(input + 'T12:00:00');
  if (isNaN(newDate)) {
    alert('Invalid date.');
    return;
  }

  // Update completion timestamp (normalized to noon for safety)
  entry.completedAtISO = newDate.toISOString();

  // If linked to a task, only sync completedAtISO for non-repeating tasks.
  // Repeating tasks should keep their recurrence and next due date intact.
  if (entry.taskId) {
    const t = state.tasks.find(t => t.id === entry.taskId);
    if (t) {
      const mode = (t.recurrence && t.recurrence.mode) || 'none';
      if (mode === 'none') {
        t.completedAtISO = entry.completedAtISO;
      }
    }
  }

  save();
  render();
}

function editSleepScore(id){
  const entry = state.completions.find(c => c.id === id);
  if (!entry) return;

  const { score, rested } = getSleepInfo(entry);
  const currentScore = Number.isFinite(score) ? score : '';

  const newScore = prompt('Edit sleep score for this entry (0–100):', currentScore);
  if (newScore === null) return; // user pressed cancel

  const newRestedInput = prompt('Edit how rested you felt (number, blank = 0):', `${rested ?? 0}`);
  if (newRestedInput === null) return;

  const raw = Number(newScore);
  if (isNaN(raw) || raw < 0 || raw > 100) {
    alert('Invalid score. Please enter a number between 0 and 100.');
    return;
  }

  const newRested = newRestedInput.trim() === '' ? 0 : Number(newRestedInput);
  if (!Number.isFinite(newRested)) {
    alert('Invalid rested number.');
    return;
  }

  entry.title = `Sleep Score (${raw}) — Rest ${newRested}`;
  entry.points = sleepPoints(raw, newRested); // keep in sync with main-page logic
  entry.sleepRested = newRested;


  save();
  render();
}


let logBootStarted = false;
let logEnhancementScheduled = false;
let logEnhancedReady = false;

function runLogEnhancementStage() {
  if (logEnhancedReady) return;
  const perfStart = performance.now();
  migrateSleepEntriesForBonus();
  migrateWorkEntriesForHours();
  syncDerivedPointsIfNeeded();
  logEnhancedReady = true;
  if (window.TP_DEBUG_PERF) console.log('[log:perf] stageBMigrationsSyncMs', (performance.now() - perfStart).toFixed(1));
  renderFull();
}

function scheduleLogEnhancementStage() {
  if (logEnhancementScheduled) return;
  logEnhancementScheduled = true;
  requestAnimationFrame(() => {
    const runStageB = () => runLogEnhancementStage();
    if (typeof requestIdleCallback === 'function') {
      requestIdleCallback(runStageB, { timeout: 1200 });
    } else {
      setTimeout(runStageB, 0);
    }
  });
}

function runLogBoot() {
  if (logBootStarted) return;
  logBootStarted = true;
  renderBaseOnly();
  scheduleLogEnhancementStage();
}

runLogBoot();

</script>

  <span>⬆️</span>
