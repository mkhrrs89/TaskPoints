<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TaskPoints — Achievements</title>

  
  <link rel="stylesheet" href="assets/tailwind.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="preload" href="toolbar.js" as="script">
  <script src="toolbar.js" defer></script>

  <style>
    .achievementTabs{
      display:flex;
      gap:10px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .achievementTab{
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(8, 14, 22, 0.7);
      color: #e5edf5;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 800;
    }
    .achievementTab.active{
      background: linear-gradient(180deg, #ffbd68, #ff8a3d);
      color: #111827;
      border-color: rgba(255, 189, 104, 0.75);
    }
    .badgesTable{
      display:flex;
      flex-direction:column;
      border:1px solid rgba(148, 163, 184, 0.16);
      border-radius:16px;
      overflow:hidden;
      background: rgba(8, 14, 22, 0.45);
    }
    .badgesHeader,.badgesRow{
      display:grid;
      grid-template-columns:minmax(120px,1fr) minmax(140px,2fr);
      gap:12px;
      align-items:center;
      padding:12px 14px;
    }
    .badgesHeader{
      color:#9fb2c8;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.04);
    }
    .badgesRow{border-top:1px solid rgba(148, 163, 184, 0.12);}
    .badgesPlayerName{text-align:left;font-weight:900;color:#f8fafc;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .badgesEarned{text-align:left;color:#cbd5e1;min-width:0;}
    @media (max-width:640px){
      .badgesHeader,.badgesRow{grid-template-columns:minmax(95px,.9fr) minmax(120px,1.4fr);padding:10px 12px;gap:8px;}
    }
  </style>

</head>

<body class="min-h-screen">
  <div id="appRoot" class="mx-auto max-w-6xl p-3 sm:p-4 pb-16 md:pb-5">
    <div class="flex items-center justify-between gap-3 mb-3 md:hidden">
      <a href="index.html" class="flex items-center gap-3">
        <img src="assets/taskpoints-logo.png" alt="TaskPoints logo" class="w-10 h-10 rounded-2xl object-cover shrink-0 shadow-sm">
        <h1 class="text-2xl font-extrabold tracking-tight leading-tight">
          <span style="color:#fb923c;">Task</span><span style="color:#1e666d;">Points</span>
        </h1>
      </a>
      <div class="flex items-center gap-2">
        <button type="button" class="btn btn-ghost btn-toolbar" data-export-button>Export</button>
        <label class="btn btn-ghost btn-toolbar cursor-pointer">
          <span>Import</span>
          <input type="file" accept="application/json" class="hidden" data-import-input/>
        </label>
      </div>
    </div>

    <header class="mb-3">
      <div class="row items-center gap-3 sm:gap-4">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="hidden md:block p-2 rounded-2xl bg-slate-900/50 border border-slate-700/60 shadow-inner">
            <img src="assets/taskpoints-logo.png" alt="TaskPoints logo" class="w-10 h-10 rounded-2xl object-cover shrink-0">
          </div>
          <div class="min-w-0">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight flex items-center gap-2 page-title">Achievements</h1>
          </div>
        </div>

        <div class="toolbar header-nav mt-3 sm:mt-0">
          <a href="index.html" class="btn btn-teal btn-toolbar nav-btn">Main</a>
          <a href="today.html" class="btn btn-teal btn-toolbar nav-btn mobile-hide-header-today">Today</a>
          <a href="daily_sources.html" class="btn btn-teal btn-toolbar nav-btn">Sources</a>
          <a href="log.html" class="btn btn-teal btn-toolbar nav-btn">Log</a>
          <a href="week.html" class="btn btn-teal btn-toolbar nav-btn">Week</a>

          <div class="dropdown hidden md:block">
            <button type="button" class="btn btn-teal btn-toolbar dropdown-toggle nav-btn" data-dropdown-toggle aria-expanded="false">
              Game <span class="caret">▾</span>
            </button>
            <div class="dropdown-menu">
              <a href="gamehub.html" class="btn btn-teal btn-toolbar nav-btn">Game Hub</a>
              <a href="game.html" class="btn btn-teal btn-toolbar nav-btn">Players</a>
              <a href="standings.html" class="btn btn-teal btn-toolbar nav-btn">Standings</a>
              <a href="rankings.html" class="btn btn-teal btn-toolbar nav-btn">Rankings</a>
              <a href="matchups.html" class="btn btn-teal btn-toolbar nav-btn">Matchups</a>
              <a href="head_to_heads.html" class="btn btn-teal btn-toolbar nav-btn">Head to Heads</a>
              <a href="schedule.html" class="btn btn-teal btn-toolbar nav-btn">Schedule</a>
              <a href="game_ratings.html" class="btn btn-teal btn-toolbar nav-btn">Ratings</a>
              <a href="records.html" class="btn btn-teal btn-toolbar nav-btn">Records</a>
            </div>
          </div>

          <a href="projects.html" class="btn btn-teal btn-toolbar nav-btn">Projects</a>
          <a href="settings.html" class="btn btn-teal btn-toolbar nav-btn">Settings</a>
        </div>
      </div>
    </header>

    <section class="glass achievements-card">
      <div class="achievementTabs" role="tablist" aria-label="Achievements and badges">
        <button id="achievementsTabBtn" class="achievementTab active" type="button" role="tab" aria-selected="true">Achievements</button>
        <button id="badgesTabBtn" class="achievementTab" type="button" role="tab" aria-selected="false">Badges</button>
      </div>

      <section id="achievementsTabPanel">
        <h2 class="text-xl font-semibold mb-1">Achievements</h2>
        <p class="muted text-sm">Coming soon.</p>
      </section>

      <section id="badgesTabPanel" hidden>
        <div class="badgesTable">
          <div class="badgesHeader">
            <div>Player</div>
            <div>Badges</div>
          </div>
          <div id="badgesRows"></div>
        </div>
      </section>
    </section>
  </div>
<script src="scoring_core.js"></script>
<script>
  function escapeHtml(value){
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function getAchievementsPageState(){
    try {
      if (window.TaskPointsCore && typeof TaskPointsCore.loadAppState === 'function') {
        const loaded = TaskPointsCore.loadAppState({
          syncDerived: false,
          persistSync: false
        });
        if (loaded && loaded.state) return loaded.state;
      }
    } catch (err) {
      console.warn('[badges] TaskPointsCore.loadAppState failed', err);
    }

    try {
      const raw = localStorage.getItem('taskpoints_v1');
      return raw ? JSON.parse(raw) : {};
    } catch (err) {
      console.warn('[badges] failed to parse taskpoints_v1', err);
      return {};
    }
  }

  function getActivePlayersForBadges(){
    const currentState = getAchievementsPageState();
    const sourcePlayers = Array.isArray(currentState.players) ? currentState.players : [];

    return sourcePlayers
      .filter((player) => {
        if (!player) return false;

        if (player.active === false) return false;
        if (player.archived === true) return false;
        if (player.retired === true) return false;
        if (player.deleted === true) return false;
        if (player.hidden === true) return false;
        if (player.inactive === true) return false;

        const status = String(player.status || player.state || '').toLowerCase();
        if (['archived', 'retired', 'deleted', 'hidden', 'inactive'].includes(status)) {
          return false;
        }

        const name = player.name || player.displayName || player.nickname;
        if (!name) return false;

        return true;
      })
      .sort((a, b) => {
        const an = String(a.name || a.displayName || a.nickname || '');
        const bn = String(b.name || b.displayName || b.nickname || '');
        return an.localeCompare(bn);
      });
  }

  function getPlayerBadges(player){
    if (!player) return [];

    if (Array.isArray(player.badges)) return player.badges;
    if (Array.isArray(player.earnedBadges)) return player.earnedBadges;
    if (Array.isArray(player.trophies)) return player.trophies;

    const currentState = getAchievementsPageState();
    const playerId = player.id || player.playerId;
    const badgeMap = currentState.playerBadges || {};

    if (playerId && badgeMap && Array.isArray(badgeMap[playerId])) {
      return badgeMap[playerId];
    }

    return [];
  }

  function formatPlayerBadges(player){
    const badges = getPlayerBadges(player);
    if (!badges.length) return '—';
    return badges.map((badge) => {
      if (typeof badge === 'string') return badge;
      return badge?.label || badge?.name || badge?.title || 'Badge';
    }).join(', ');
  }

  function renderBadgesTab(){
    const rowsEl = document.getElementById('badgesRows');
    if (!rowsEl) {
      console.warn('[badges] missing #badgesRows container');
      return;
    }

    const currentState = getAchievementsPageState();
    const allPlayers = Array.isArray(currentState.players) ? currentState.players : [];
    const players = getActivePlayersForBadges();

    console.debug('[badges] render', {
      allPlayers: allPlayers.length,
      activePlayers: players.length,
      sample: allPlayers.slice(0, 5).map((p) => ({
        id: p?.id || p?.playerId,
        name: p?.name || p?.displayName || p?.nickname,
        active: p?.active,
        archived: p?.archived,
        retired: p?.retired,
        inactive: p?.inactive,
        status: p?.status
      }))
    });

    if (!players.length) {
      rowsEl.innerHTML = '<div class="badgesRow"><div class="muted">No active players found.</div><div>—</div></div>';
      return;
    }

    rowsEl.innerHTML = players.map((player) => {
      const name = escapeHtml(player.name || player.displayName || player.nickname || 'Unnamed Player');
      const badges = escapeHtml(formatPlayerBadges(player));

      return `
        <div class="badgesRow">
          <div class="badgesPlayerName">${name}</div>
          <div class="badgesEarned">${badges}</div>
        </div>
      `;
    }).join('');
  }

  function setTrophyPageTab(tab){
    const isAchievements = tab === 'achievements';
    document.getElementById('achievementsTabBtn')?.classList.toggle('active', isAchievements);
    document.getElementById('badgesTabBtn')?.classList.toggle('active', !isAchievements);
    document.getElementById('achievementsTabBtn')?.setAttribute('aria-selected', String(isAchievements));
    document.getElementById('badgesTabBtn')?.setAttribute('aria-selected', String(!isAchievements));

    const achievementsPanel = document.getElementById('achievementsTabPanel');
    const badgesPanel = document.getElementById('badgesTabPanel');
    if (achievementsPanel) achievementsPanel.hidden = !isAchievements;
    if (badgesPanel) badgesPanel.hidden = isAchievements;
    if (!isAchievements) renderBadgesTab();
  }

  document.getElementById('achievementsTabBtn')?.addEventListener('click', () => setTrophyPageTab('achievements'));
  document.getElementById('badgesTabBtn')?.addEventListener('click', () => setTrophyPageTab('badges'));
  setTrophyPageTab('achievements');
  renderBadgesTab();
</script>

</body>
</html>
